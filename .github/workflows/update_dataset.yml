name: Update dataset

on:
  schedule:
    - cron: "0 1 * * 5"   # every Friday at 01:00 UTC (noon AEDT / 11:00 AEST)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
      R2_ACCOUNT_ID:               ${{ secrets.R2_ACCOUNT_ID }}
      R2_PRIVATE_ACCESS_KEY_ID:    ${{ secrets.R2_PRIVATE_ACCESS_KEY_ID }}
      R2_PRIVATE_SECRET_ACCESS_KEY: ${{ secrets.R2_PRIVATE_SECRET_ACCESS_KEY }}
      R2_PRIVATE_BUCKET:           ${{ secrets.R2_PRIVATE_BUCKET }}
      R2_PUBLIC_ACCESS_KEY_ID:     ${{ secrets.R2_PUBLIC_ACCESS_KEY_ID }}
      R2_PUBLIC_SECRET_ACCESS_KEY: ${{ secrets.R2_PUBLIC_SECRET_ACCESS_KEY }}
      R2_PUBLIC_BUCKET:            ${{ secrets.R2_PUBLIC_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Pull pipeline state from R2
        run: uv run python pipeline/r2_sync.py pull

      - name: Download new gazettes
        run: uv run python pipeline/01_download.py --year-start 2021 --year-end $(date +%Y)

      - name: Archive PDFs to R2
        run: uv run python pipeline/r2_sync.py push-pdfs

      - name: Parse PDFs
        run: uv run python pipeline/02_parse.py batch

      - name: Normalise fields
        run: uv run python pipeline/03_normalise.py

      - name: Apply agency crosswalk
        run: uv run python pipeline/05_apply_crosswalk.py

      - name: Build release files
        run: uv run python pipeline/06_build_release.py

      - name: Clean text
        run: uv run python pipeline/07_clean_text.py

      - name: Classify job families
        run: uv run python pipeline/08_classify_job_family.py

      - name: Check agency coverage
        run: uv run python pipeline/09_check_coverage.py

      - name: Push pipeline state and release files to R2
        run: uv run python pipeline/r2_sync.py push
